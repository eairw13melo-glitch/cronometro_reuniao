<!DOCTYPE html>
<html lang="pt-BR"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1"><meta name="theme-color" content="#22314a"><title>Apresentação — Cronômetro</title><style>
:root{--paper:#f2ede1;--navy:#22314a;--gold:#b3862c;--danger:#dc6b6b;--muted:#c7cfdb}*{box-sizing:border-box}html,body{height:100%}body{margin:0;background:var(--navy);color:var(--paper);font-family:Arial,sans-serif;display:grid;place-items:center;padding:24px}.card{width:min(980px,100%);text-align:center}.week{font-size:clamp(14px,2vw,20px);color:var(--muted);margin-bottom:18px}.section{display:inline-block;padding:7px 15px;border-radius:999px;background:rgba(255,255,255,.12);font-weight:700;letter-spacing:.1em;text-transform:uppercase;font-size:clamp(11px,1.6vw,16px)}.name{font-family:Georgia,serif;font-size:clamp(32px,6vw,76px);line-height:1.08;margin:24px auto 10px;max-width:900px}.speaker{color:var(--gold);font-size:clamp(17px,2.5vw,28px);min-height:1.4em}.time{font-family:Georgia,serif;font-variant-numeric:tabular-nums;font-size:clamp(92px,20vw,220px);font-weight:700;line-height:1;margin:34px 0 24px}.time.over{color:var(--danger)}.next{font-size:clamp(14px,2vw,22px);color:var(--muted)}.status{position:fixed;bottom:12px;right:16px;color:var(--muted);font-size:12px}
</style></head><body><main class="card"><div class="week" id="week">Aguardando o controlador…</div><div class="section" id="section">—</div><h1 class="name" id="name">Abra o cronômetro em outra aba</h1><div class="speaker" id="speaker"></div><div class="time" id="time">00:00</div><div class="next" id="next"></div></main><div class="status" id="status">Sincronização local</div><script>
(function(){'use strict';var KEY='cronometro_vida_ministerio_presentation_v3';var CHANNEL='cronometro_vida_ministerio_channel';var payload=null;function $(id){return document.getElementById(id)}function read(){try{return JSON.parse(localStorage.getItem(KEY)||'null')}catch(e){return null}}function fmt(ms){var over=ms<0;var s=Math.floor(Math.abs(ms)/1000);var m=String(Math.floor(s/60)).padStart(2,'0');var sec=String(s%60).padStart(2,'0');return(over?'+':'')+m+':'+sec}function elapsed(){if(!payload||!payload.current)return 0;var value=Number(payload.current.elapsedMs)||0;if(payload.current.runningSince){var base=Date.parse(payload.updatedAt)||Date.now();value+=Math.max(0,Date.now()-base)}return value}function render(){if(!payload||!payload.current)return;var c=payload.current;var remaining=(Number(c.plannedMs)||0)-elapsed();$('week').textContent=payload.weekLabel||'';$('section').textContent=c.section||'—';$('name').textContent=c.name||'Parte';$('speaker').textContent=c.speaker?'Orador: '+c.speaker:'';$('time').textContent=fmt(remaining);$('time').classList.toggle('over',remaining<0);$('next').textContent=payload.next?'Próxima: '+payload.next.name:'';$('status').textContent='Atualizado '+new Date(payload.updatedAt).toLocaleTimeString('pt-BR')}function receive(data){if(data&&data.current){payload=data;render()}}receive(read());window.addEventListener('storage',function(e){if(e.key===KEY)receive(read())});if('BroadcastChannel'in window){var bc=new BroadcastChannel(CHANNEL);bc.onmessage=function(e){receive(e.data)}}setInterval(render,250)})();
</script></body></html>
