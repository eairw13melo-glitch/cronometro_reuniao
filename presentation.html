<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Apresentação — Vida e Ministério</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#22314a">
  <link rel="icon" href="%BASE_URL%icons/app-icon.svg" type="image/svg+xml">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/src/styles.css">
</head>
<body class="presentation-page">
  <main class="presentation-shell" id="presentationShell">
    <div class="presentation-week" id="presentationWeek">Aguardando reunião…</div>
    <div class="presentation-section" id="presentationSection"></div>
    <h1 class="presentation-name" id="presentationName">Abra esta tela pelo cronômetro principal.</h1>
    <div class="presentation-speaker" id="presentationSpeaker"></div>
    <div class="presentation-time" id="presentationTime">00:00</div>
    <div class="presentation-next" id="presentationNext"></div>
    <div class="presentation-actions">
      <button class="btn-ghost" id="fullscreenBtn">Tela cheia</button>
      <button class="btn-ghost" id="wakeBtn">Manter tela ligada</button>
    </div>
    <div class="presentation-status" id="presentationStatus">Conectando…</div>
  </main>
  <script type="module" src="/src/presentation.js"></script>
</body>
</html>
