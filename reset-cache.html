<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Limpar cache do cronômetro</title>
  <style>
    body{margin:0;min-height:100vh;display:grid;place-items:center;background:#f2ede1;color:#1c2430;font-family:Arial,sans-serif;padding:20px}
    main{max-width:560px;background:#fff;padding:28px;border-radius:16px;box-shadow:0 14px 40px rgba(0,0,0,.12)}
    h1{color:#22314a}button,a{display:inline-block;border:0;border-radius:8px;padding:11px 16px;font-weight:700;text-decoration:none;cursor:pointer}
    button{background:#b3862c;color:#241c07}a{background:#22314a;color:#fff;margin-left:8px}#status{margin-top:16px;line-height:1.5}
  </style>
</head>
<body>
  <main>
    <h1>Limpar versão antiga</h1>
    <p>Use esta página uma única vez depois de substituir o projeto antigo. Ela remove apenas caches e service workers; sua programação salva no navegador é preservada.</p>
    <button id="clearBtn" type="button">Limpar cache e atualizar</button>
    <a href="/index.html">Voltar</a>
    <div id="status"></div>
  </main>
  <script>
    document.getElementById('clearBtn').addEventListener('click', async () => {
      const status = document.getElementById('status');
      status.textContent = 'Limpando…';
      try {
        const registrations = await navigator.serviceWorker?.getRegistrations?.() || [];
        await Promise.all(registrations.map((registration) => registration.unregister()));
        const keys = await caches.keys();
        await Promise.all(keys.map((key) => caches.delete(key)));
        status.textContent = 'Cache limpo. Abrindo a versão nova…';
        setTimeout(() => location.replace('./index.html?cache=' + Date.now()), 700);
      } catch (error) {
        status.textContent = 'Não foi possível limpar automaticamente: ' + error.message;
      }
    });
  </script>
</body>
</html>
